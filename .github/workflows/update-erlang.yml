name: Update Erlang

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-erlang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for Erlang updates and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./support/update-erlang.sh --pr
